<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="/css/style.css" />
  <script type="module" src="../js/checkout.js"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>
    </section>
    <form action="" method="get">
      <label>First name<input type="text" name="fname" required></label>
      <label>Last name<input type="text" name="lname" required></label>
      
      <label>Street Address<input type="text" name="address" required></label>
      <label>City<input type="text" name="city" required></label>
      <label>State<input type="text" name="state" required></label>
      <label>Zip Code<input type="text" name="zcode" id="zip" required></label>
      
      <label>Credit Number<input type="number" name="creditnumber" required></label>
      <label>Expiration Date<input type="month" name="expiDate" required></label>
      <label>Security Code<input type="number" name="scode" required></label>

      <aside class="order_summary">
        <p>Subtotal: <span id="subtotal"></span></p>
        <p>Tax: <span id="tax"></span></p>
        <p>Shipping: <span id="shipping"></span></p>
        <p>Order Total: <span id="total"></span></p>
      </aside>

      <button type="submit">Checkout</button>
    </form>
    
  </main>

  <footer id="main-footer"></footer>
</body>

</html>
